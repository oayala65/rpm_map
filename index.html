<html lang="es">

<title>RPM Remolcador MBIGUA - Mapa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  
  #header {
    background: #1a1d27;
    padding: 12px 20px;
    border-bottom: 1px solid #2d3147;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  #header .sub { font-size: 12px; color: #8a8fa8; }

  #controls {
    background: #1a1d27;
    padding: 10px 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #2d3147;
    font-size: 13px;
  }
  
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; display: inline-block; border: 2px solid rgba(255,255,255,0.2); }
  .dot-red { background: #e74c3c; }
  .dot-blue { background: #3498db; }
  .dot-green { background: #2ecc71; }
  .dot-orange { background: #f39c12; }
  .dot-purple { background: #9b59b6; }
  
  #layer-controls { display: flex; gap: 12px; align-items: center; margin-left: auto; }
  .toggle-btn {
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    font-size: 12px; border: 1px solid #3a3f5c; background: #252940;
    color: #ccc; transition: all 0.2s;
  }
  .toggle-btn.active { background: #3a3f9c; border-color: #5566cc; color: #fff; }
  
  #date-bar {
    background: #151820;
    padding: 10px 20px 12px;
    border-bottom: 1px solid #2d3147;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  #date-bar label { color: #8a8fa8; white-space: nowrap; }
  #date-bar .date-val { color: #fff; font-weight: 600; min-width: 110px; }
  #date-bar .slider-wrap { flex: 1; min-width: 200px; position: relative; }
  .range-track {
    position: relative; height: 4px; background: #2d3147; border-radius: 2px;
    margin: 10px 0;
  }
  .range-fill { position: absolute; height: 100%; background: #5566cc; border-radius: 2px; }
  input[type=range] {
    position: absolute; top: -7px; width: 100%; pointer-events: none;
    -webkit-appearance: none; background: transparent; margin: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; pointer-events: all; width: 16px; height: 16px;
    border-radius: 50%; background: #7788ee; border: 2px solid #fff;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  #date-bar .pts-count { color: #8a8fa8; white-space: nowrap; margin-left: auto; }
  #date-bar .pts-count span { color: #fff; font-weight: 600; }

  #map { flex: 1; }
  
  #info-panel {
    position: absolute;
    top: 130px;
    right: 12px;
    width: 260px;
    background: rgba(26,29,39,0.95);
    border: 1px solid #2d3147;
    border-radius: 8px;
    padding: 14px;
    z-index: 1000;
    font-size: 12px;
    display: none;
  }
  #info-panel h3 { font-size: 13px; color: #fff; margin-bottom: 10px; border-bottom: 1px solid #2d3147; padding-bottom: 8px; }
  .rpm-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1e2133; }
  .rpm-label { color: #8a8fa8; }
  .rpm-value { font-weight: 600; font-size: 14px; }
  .rpm-value.red { color: #e74c3c; }
  .rpm-value.blue { color: #3498db; }
  .rpm-value.green { color: #2ecc71; }
  .rpm-value.normal { color: #e0e0e0; }
  .diff-badge { font-size: 11px; padding: 2px 6px; border-radius: 3px; background: #e74c3c22; color: #e74c3c; }
  #info-panel .dt { color: #666; font-size: 11px; margin-top: 8px; }
</style>
</head>

// Parse date dd-mm-yyyy hh:mm:ss -> timestamp
function parseDate(str) {
  const [d, m, y, hms] = [str.slice(0,2), str.slice(3,5), str.slice(6,10), str.slice(11)];
  return new Date(`${y}-${m}-${d}T${hms}`).getTime();
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('es-PY', { day:'2-digit', month:'short', year:'numeric' });
}

// Precompute timestamps
DATA.forEach(pt => { pt.ts = parseDate(pt.dt); });
const allTs = DATA.map(p => p.ts).sort((a,b) => a-b);
const minTs = allTs[0], maxTs = allTs[allTs.length-1];

// Color logic per engine comparing against the other two
function getColor(val, other1, other2) {
  if (val === 0) return '#555'; // off
  const active = [val, other1, other2].filter(v => v > 0);
  if (active.length < 2) return '#2ecc71';
  const maxVal = Math.max(...active);
  const minVal = Math.min(...active);
  if (minVal === 0) return '#2ecc71';
  const diffPct = (maxVal - minVal) / minVal;
  if (diffPct > 0.10) {
    return val === maxVal ? '#e74c3c' : (val === minVal ? '#3498db' : '#f39c12');
  }
  return '#2ecc71';
}

// Check if there's a >10% difference among active engines
function hasDiff(br, stb, cnt) {
  const active = [br, stb, cnt].filter(v => v > 0);
  if (active.length < 2) return false;
  const max = Math.max(...active), min = Math.min(...active);
  return (max - min) / min > 0.10;
}

const map = L.map('map').setView([-26.5, -57.8], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const layers = { br: L.layerGroup().addTo(map), stb: L.layerGroup().addTo(map), cnt: L.layerGroup().addTo(map) };
const layerVisible = { br: true, stb: true, cnt: true };
const infoPanel = document.getElementById('info-panel');

// Build all markers upfront, store references
const markers = DATA.map(pt => {
  const brC  = getColor(pt.br,  pt.stb, pt.cnt);
  const stbC = getColor(pt.stb, pt.br,  pt.cnt);
  const cntC = getColor(pt.cnt, pt.br,  pt.stb);
  const mkBr  = L.circleMarker([pt.lat, pt.lon], { radius:6, fillColor:brC,  color:'rgba(0,0,0,0.3)', weight:1, fillOpacity:0.9 });
  const mkStb = L.circleMarker([pt.lat, pt.lon], { radius:6, fillColor:stbC, color:'rgba(0,0,0,0.3)', weight:1, fillOpacity:0.9 });
  const mkCnt = L.circleMarker([pt.lat, pt.lon], { radius:6, fillColor:cntC, color:'rgba(0,0,0,0.3)', weight:1, fillOpacity:0.9 });
  [mkBr, mkStb, mkCnt].forEach(m => m.on('click', () => showInfo(pt)));
  return { pt, mkBr, mkStb, mkCnt };
});

function renderMarkers(fromTs, toTs) {
  Object.values(layers).forEach(l => l.clearLayers());
  let count = 0;
  markers.forEach(({ pt, mkBr, mkStb, mkCnt }) => {
    if (pt.ts < fromTs || pt.ts > toTs) return;
    count++;
    if (layerVisible.br)  layers.br.addLayer(mkBr);
    if (layerVisible.stb) layers.stb.addLayer(mkStb);
    if (layerVisible.cnt) layers.cnt.addLayer(mkCnt);
  });
  document.getElementById('pts-visible').textContent = count;
}

// Slider logic
const sliderFrom = document.getElementById('slider-from');
const sliderTo   = document.getElementById('slider-to');
const lblFrom    = document.getElementById('lbl-from');
const lblTo      = document.getElementById('lbl-to');
const fill       = document.getElementById('range-fill');

function tsFromPct(pct) { return minTs + (maxTs - minTs) * pct / 100; }

function updateSliders() {
  let v1 = parseInt(sliderFrom.value), v2 = parseInt(sliderTo.value);
  if (v1 > v2 - 2) { if (this === sliderFrom) v1 = v2 - 2; else v2 = v1 + 2; }
  sliderFrom.value = v1; sliderTo.value = v2;
  fill.style.left  = v1 + '%';
  fill.style.width = (v2 - v1) + '%';
  const fromTs = tsFromPct(v1), toTs = tsFromPct(v2);
  lblFrom.textContent = fmtDate(fromTs);
  lblTo.textContent   = fmtDate(toTs);
  renderMarkers(fromTs, toTs);
}

sliderFrom.addEventListener('input', updateSliders);
sliderTo.addEventListener('input',   updateSliders);
updateSliders(); // init

function showInfo(pt) {
  const brC  = getColor(pt.br,  pt.stb, pt.cnt);
  const stbC = getColor(pt.stb, pt.br,  pt.cnt);
  const cntC = getColor(pt.cnt, pt.br,  pt.stb);
  const colorClass = c => c === '#e74c3c' ? 'red' : c === '#3498db' ? 'blue' : c === '#2ecc71' ? 'green' : 'normal';

  document.getElementById('info-br').textContent  = pt.br  > 0 ? pt.br  + ' RPM' : 'OFF';
  document.getElementById('info-br').className    = 'rpm-value ' + colorClass(brC);
  document.getElementById('info-stb').textContent = pt.stb > 0 ? pt.stb + ' RPM' : 'OFF';
  document.getElementById('info-stb').className   = 'rpm-value ' + colorClass(stbC);
  document.getElementById('info-cnt').textContent = pt.cnt > 0 ? pt.cnt + ' RPM' : 'OFF';
  document.getElementById('info-cnt').className   = 'rpm-value ' + colorClass(cntC);

  const diffRow = document.getElementById('diff-row');
  if (hasDiff(pt.br, pt.stb, pt.cnt)) {
    const active = [pt.br, pt.stb, pt.cnt].filter(v => v > 0);
    const pct = ((Math.max(...active) - Math.min(...active)) / Math.min(...active) * 100).toFixed(1);
    document.getElementById('info-diff').textContent = pct + '%';
    diffRow.style.display = 'flex';
  } else {
    diffRow.style.display = 'none';
  }
  document.getElementById('info-dt').textContent = '📅 ' + pt.dt;
  infoPanel.style.display = 'block';
}

function toggleLayer(key, btn) {
  btn.classList.toggle('active');
  layerVisible[key] = btn.classList.contains('active');
  const fromTs = tsFromPct(parseInt(sliderFrom.value));
  const toTs   = tsFromPct(parseInt(sliderTo.value));
  renderMarkers(fromTs, toTs);
}
