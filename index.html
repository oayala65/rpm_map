<style>

  #header .sub { font-size: 11px; color: #8a8fa8; }

  /* MODE SELECTOR */

  #mode-bar span { color: #8a8fa8; margin-right: 4px; }
  .mode-btn { padding: 5px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; border: 1px solid #3a3f5c; background: #252940; color: #aaa; transition: all 0.2s; }
  .mode-btn.active { background: #2a3a6a; border-color: #4a6acc; color: #fff; font-weight: 600; }
  #mode-bar .mode-unit { color: #5566cc; font-size: 11px; margin-left: 6px; }

  /* CONTROLS */

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid rgba(255,255,255,0.15); }

  .toggle-btn.active { background: #3a3f9c; border-color: #5566cc; color: #fff; }

  /* DATE SLIDER */
  #date-bar { background: #151820; padding: 9px 20px 11px; border-bottom: 1px solid #2d3147; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; font-size: 12px; }
  #date-bar label { color: #8a8fa8; white-space: nowrap; }
  #date-bar .date-val { color: #fff; font-weight: 600; min-width: 105px; }
  #date-bar .slider-wrap { flex: 1; min-width: 200px; position: relative; }
  .range-track { position: relative; height: 4px; background: #2d3147; border-radius: 2px; margin: 10px 0; }
  .range-fill { position: absolute; height: 100%; background: #5566cc; border-radius: 2px; }
  input[type=range] { position: absolute; top: -7px; width: 100%; pointer-events: none; -webkit-appearance: none; background: transparent; margin: 0; }

  #date-bar .pts-count { color: #8a8fa8; white-space: nowrap; margin-left: auto; }
  #date-bar .pts-count span { color: #fff; font-weight: 600; }

  #map { flex: 1; }

  /* INFO PANEL */
  #info-panel { position: absolute; top: 145px; right: 12px; width: 268px; background: rgba(22,25,37,0.97); border: 1px solid #2d3147; border-radius: 8px; padding: 13px; z-index: 1000; font-size: 12px; display: none; }

  .data-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1e2133; }
  .data-label { color: #8a8fa8; }
  .data-value { font-weight: 600; font-size: 13px; }

  #info-panel .dt { color: #555; font-size: 11px; margin-top: 8px; }
  .mode-label { font-size: 10px; color: #5566cc; margin-top: 6px; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }

let currentMode = 'rpm'; // 'rpm' or 'temp'

function parseDate(str) {
  const d=str.slice(0,2),m=str.slice(3,5),y=str.slice(6,10),hms=str.slice(11);
  return new Date(`${y}-${m}-${d}T${hms}`).getTime();
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('es-PY',{day:'2-digit',month:'short',year:'numeric'});
}

DATA.forEach(pt => { pt.ts = parseDate(pt.dt); });
const allTs = DATA.map(p=>p.ts).sort((a,b)=>a-b);
const minTs = allTs[0], maxTs = allTs[allTs.length-1];

// Generic color logic: red=max (>10% diff vs avg), blue=min, orange=mid, green=balanced
function getColor(val, other1, other2) {
  if (val === 0) return '#555';
  const active = [val, other1, other2].filter(v => v > 0);
  if (active.length < 2) return '#2ecc71';
  const maxV = Math.max(...active), minV = Math.min(...active);
  const avg  = active.reduce((s,v)=>s+v,0) / active.length;
  if ((maxV - minV) / avg > 0.10) {
    if (val === maxV) return '#e74c3c';
    if (val === minV) return '#3498db';
    return '#f39c12';
  }
  return '#2ecc71';
}

function hasDiff(a, b, c) {
  const active = [a,b,c].filter(v=>v>0);
  if (active.length < 2) return false;
  const max=Math.max(...active), min=Math.min(...active);
  const avg=active.reduce((s,v)=>s+v,0)/active.length;
  return (max-min)/avg > 0.10;
}

// Map setup
const map = L.map('map').setView([-26.5, -57.8], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);

const layers = { br: L.layerGroup().addTo(map), stb: L.layerGroup().addTo(map), cnt: L.layerGroup().addTo(map) };
const layerVisible = { br: true, stb: true, cnt: true };
const infoPanel = document.getElementById('info-panel');

// Pre-build all markers for both modes
const markers = DATA.map(pt => {
  function mk(lat, lon) {
    return L.circleMarker([lat,lon],{radius:6,fillColor:'#555',color:'rgba(0,0,0,0.25)',weight:1,fillOpacity:0.92});
  }
  const mBr  = mk(pt.lat, pt.lon);
  const mStb = mk(pt.lat, pt.lon);
  const mCnt = mk(pt.lat, pt.lon);
  [mBr, mStb, mCnt].forEach(m => m.on('click', () => showInfo(pt)));
  return { pt, mBr, mStb, mCnt };
});

function updateMarkerColors() {
  markers.forEach(({ pt, mBr, mStb, mCnt }) => {
    let brV, stbV, cntV;
    if (currentMode === 'rpm') {
      brV=pt.br; stbV=pt.stb; cntV=pt.cnt;
    } else {
      brV=pt.br_t; stbV=pt.stb_t; cntV=pt.cnt_t;
    }
    mBr.setStyle({fillColor:  getColor(brV,  stbV, cntV)});
    mStb.setStyle({fillColor: getColor(stbV, brV,  cntV)});
    mCnt.setStyle({fillColor: getColor(cntV, brV,  stbV)});
  });
}

function renderMarkers(fromTs, toTs) {
  Object.values(layers).forEach(l=>l.clearLayers());
  let count = 0;
  markers.forEach(({pt, mBr, mStb, mCnt}) => {
    if (pt.ts < fromTs || pt.ts > toTs) return;
    count++;
    if (layerVisible.br)  layers.br.addLayer(mBr);
    if (layerVisible.stb) layers.stb.addLayer(mStb);
    if (layerVisible.cnt) layers.cnt.addLayer(mCnt);
  });
  document.getElementById('pts-visible').textContent = count;
}

function currentRange() {
  return {
    fromTs: minTs + (maxTs-minTs)*parseInt(sliderFrom.value)/100,
    toTs:   minTs + (maxTs-minTs)*parseInt(sliderTo.value)/100
  };
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const unit = mode === 'rpm' ? 'Mostrando: RPM' : 'Mostrando: Temp. Aceite Caja (°C)';
  document.getElementById('mode-unit').textContent = unit;
  updateMarkerColors();
  const {fromTs, toTs} = currentRange();
  renderMarkers(fromTs, toTs);
  if (infoPanel.style.display !== 'none') infoPanel.style.display = 'none';
}

// Slider
const sliderFrom = document.getElementById('slider-from');
const sliderTo   = document.getElementById('slider-to');
const fill       = document.getElementById('range-fill');

function updateSliders() {
  let v1=parseInt(sliderFrom.value), v2=parseInt(sliderTo.value);
  if (v1 > v2-2) { if (this===sliderFrom) v1=v2-2; else v2=v1+2; }
  sliderFrom.value=v1; sliderTo.value=v2;
  fill.style.left=v1+'%'; fill.style.width=(v2-v1)+'%';
  const fromTs=minTs+(maxTs-minTs)*v1/100, toTs=minTs+(maxTs-minTs)*v2/100;
  document.getElementById('lbl-from').textContent=fmtDate(fromTs);
  document.getElementById('lbl-to').textContent=fmtDate(toTs);
  updateMarkerColors();
  renderMarkers(fromTs, toTs);
}
sliderFrom.addEventListener('input', updateSliders);
sliderTo.addEventListener('input',   updateSliders);
updateSliders();

function showInfo(pt) {
  let brV, stbV, cntV, unit, fmt;
  if (currentMode === 'rpm') {
    brV=pt.br; stbV=pt.stb; cntV=pt.cnt; unit=' RPM';
    fmt = v => v > 0 ? v + unit : 'OFF';
    document.getElementById('panel-title').textContent = '📍 RPM Propulsores';
    document.getElementById('panel-mode-label').textContent = 'Revoluciones por minuto';
  } else {
    brV=pt.br_t; stbV=pt.stb_t; cntV=pt.cnt_t; unit=' °C';
    fmt = v => v > 0 ? v.toFixed(1) + unit : '—';
    document.getElementById('panel-title').textContent = '📍 Temp. Aceite de Caja';
    document.getElementById('panel-mode-label').textContent = 'Temperatura aceite de caja (°C)';
  }

  const brC  = getColor(brV,  stbV, cntV);
  const stbC = getColor(stbV, brV,  cntV);
  const cntC = getColor(cntV, brV,  stbV);
  const cls  = c => c==='#e74c3c'?'red':c==='#3498db'?'blue':c==='#2ecc71'?'green':'normal';

  document.getElementById('info-br').textContent  = fmt(brV);
  document.getElementById('info-br').className    = 'data-value '+cls(brC);
  document.getElementById('info-stb').textContent = fmt(stbV);
  document.getElementById('info-stb').className   = 'data-value '+cls(stbC);
  document.getElementById('info-cnt').textContent = fmt(cntV);
  document.getElementById('info-cnt').className   = 'data-value '+cls(cntC);

  const diffRow = document.getElementById('diff-row');
  if (hasDiff(brV, stbV, cntV)) {
    const active=[brV,stbV,cntV].filter(v=>v>0);
    const avg=active.reduce((s,v)=>s+v,0)/active.length;
    const pct=((Math.max(...active)-Math.min(...active))/avg*100).toFixed(1);
    document.getElementById('info-diff').textContent = pct + '%';
    diffRow.style.display = 'flex';
  } else {
    diffRow.style.display = 'none';
  }
  document.getElementById('info-dt').textContent = '📅 ' + pt.dt;
  infoPanel.style.display = 'block';
}

function toggleLayer(key, btn) {
  btn.classList.toggle('active');
  layerVisible[key] = btn.classList.contains('active');
  const {fromTs, toTs} = currentRange();
  renderMarkers(fromTs, toTs);
}
</script>
</body>
</html>
